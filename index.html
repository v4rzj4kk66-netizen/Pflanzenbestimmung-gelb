<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pflanzenbestimmung – Gelbe Blüten</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(to bottom right,#fffde7,#fff9c4);
      color:#333;
    }

    header{
      background:linear-gradient(135deg,#f9a825,#fdd835);
      color:white;
      padding:25px;
      text-align:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    header h1{
      margin:0;
      font-size:2.2rem;
    }

    .container{
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:20px;
      padding:20px;
    }

    .main,.sidebar{
      background:white;
      border-radius:16px;
      padding:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    h2{
      color:#f57f17;
    }

    .option-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:20px;
      margin-top:20px;
    }

    .card{
      border:2px solid #ffe082;
      border-radius:14px;
      overflow:hidden;
      background:#fffef5;
      cursor:pointer;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
      box-shadow:0 8px 16px rgba(0,0,0,0.15);
      border-color:#fbc02d;
    }

    .card img{
      width:100%;
      height:auto;
      display:block;
    }

    .card-content{
      padding:15px;
    }

    .card-content h3{
      margin-top:0;
      color:#f57f17;
    }

    button{
      background:#fbc02d;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:10px;
      cursor:pointer;
      margin-top:20px;
      font-size:1rem;
    }

    button:hover{
      background:#f57f17;
    }

    .path-box{
      background:#fffde7;
      border-left:5px solid #fbc02d;
      padding:15px;
      border-radius:10px;
    }

    .path-step{
      background:white;
      border:1px solid #ffe082;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .plant-card{
      border:2px solid #fbc02d;
      border-radius:16px;
      overflow:hidden;
      background:#fffef7;
    }

    .plant-card img{
      width:100%;
      height:auto;
    }

    .plant-info{
      padding:20px;
    }

    .info-box{
      background:white;
      border:1px solid #ffe082;
      border-radius:10px;
      padding:12px;
      margin-top:10px;
    }

    @media(max-width:900px){
      .container{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>🌼 Pflanzenbestimmung – Gelbe Blüten 🌼</h1>
  <p>Interaktive Bestimmungshilfe für den Biologieunterricht</p>
</header>

<div class="container">

  <div class="main">
    <div id="content"></div>
  </div>

  <div class="sidebar">
    <h2>🔎 Bestimmungsweg</h2>
    <div class="path-box" id="pathBox">
      <p>Hier erscheint der Bestimmungsweg.</p>
    </div>
  </div>

</div>

<script>

const plants = {

  "Ackersenf":{

  },

  },

  "Knolliger Hahnenfuß":{

    bild:"images/knolliger_hahnenfuss.jpg"
  },

  "Scharfer Hahnenfuß":{
    familie:"Hahnenfußgewächse",

    bluetezeit:"Mai – Juli",
    bild:"images/scharfer_hahnenfuss.jpg"
  },

  "Scharbockskraut":{

  "Saat-Wucherblume":{

    bild:"images/wucherblume.jpg"
  },

  "Jakobskraut":{

    fundort:"Wiesen, Böschungen",
    bluetezeit:"Juni – September",
    bild:"images/jakobskraut.jpg"
  },

  "Huflattich":{
    familie:"Korbblütler",
    fundort:"Wegränder",
    bluetezeit:"März – April",
    bild:"images/huflattich.jpg"
  },

  "Löwenzahn":{

  },

  "Gewöhnlicher Rainkohl":{

  "Waldhabichtskraut":{

  "Echtes Leinkraut":{

    bild:"images/rainfarn.jpg"

function updatePath(text){
  path.push(text);

  document.getElementById('pathBox').innerHTML =
    path.map(step => `<div class="path-step">${step}</div>`).join('');
}

function resetPath(){
  path.length = 0;
  updatePath('Start der Bestimmung');
}

function showStart(){

  resetPath();

  document.getElementById('content').innerHTML = `

    <h2>1. Welche Blütenform hat die Pflanze?</h2>

    <div class="option-grid">

      <div class="card" onclick="showEinzelbluete()">
        <img src="images/einzelbluete.jpg">
        <div class="card-content">
          <h3>Einzelblüte</h3>
        </div>
      </div>

      <div class="card" onclick="showLippenbluete()">
        <img src="images/lippenbluete.jpg">
        <div class="card-content">
          <h3>Lippenblüte</h3>
        </div>
      </div>

      <div class="card" onclick="showZusammengesetzt()">
        <img src="images/zusammengesetzte_bluete.jpg">
        <div class="card-content">
          <h3>Zusammengesetzte Blüte</h3>
        </div>
      </div>

    </div>
  `;
}

function showEinzelbluete(){

  updatePath('Blütenform: Einzelblüte');

  document.getElementById('content').innerHTML = `

    <h2>2. Anzahl der Kronblätter</h2>

    <div class="option-grid">

      <div class="card"
      onclick="showPlants('Vier symmetrische Kronblätter',
      ['Ackersenf','Echtes Barbarakraut'])">

        <img src="images/vier_symmetrisch.jpg">

        <div class="card-content">
          <h3>Vier symmetrische Kronblätter</h3>
        </div>
      </div>

      <div class="card"
      onclick="showPlants('Fünf / sechs Kronblätter',
      ['Aufrechter Sauerklee','Gelbes Windröschen','Echte Nelkenwurz','Goldfelberich','Mauerlattich','Knolliger Hahnenfuß','Scharfer Hahnenfuß'])">

        <img src="images/fuenf_sechs.jpg">

        <div class="card-content">
          <h3>Fünf / sechs Kronblätter</h3>
        </div>
      </div>

      <div class="card"
      onclick="showPlants('Acht Kronblätter',
      ['Scharbockskraut'])">

        <img src="images/acht_kronblaetter.jpg">

        <div class="card-content">
          <h3>Acht Kronblätter</h3>
        </div>
      </div>

      <div class="card"
      onclick="showPlants('Viele Kronblätter',
      ['Saat-Wucherblume','Jakobskraut','Huflattich','Löwenzahn','Gewöhnlicher Rainkohl','Waldhabichtskraut','Wiesen-Pippau','Gewöhnliches Ferkelkraut'])">

        <img src="images/viele_kronblaetter.jpg">

        <div class="card-content">
          <h3>Viele Kronblätter</h3>
        </div>
      </div>

    </div>

    <button onclick="showStart()">⬅ Zurück</button>

  `;
}

function showLippenbluete(){

  updatePath('Blütenform: Lippenblüte');

  showPlants('Lippenblüten',[
    'Echtes Leinkraut',
    'Goldnessel',
    'Gewöhnlicher Hornklee',
    'Kleiner Klappertopf',
    'Gelbe Gauklerblume'
  ]);
}

function showZusammengesetzt(){

  updatePath('Blütenform: Zusammengesetzte Blüte');

  document.getElementById('content').innerHTML = `

    <h2>2. Form des Blütenstandes</h2>

    <div class="option-grid">

      <div class="card"
      onclick="showPlants('Blüten mit Köpfchen',
      ['Hopfenklee'])">

        <img src="images/koepfchen.jpg">

        <div class="card-content">
          <h3>Blüten mit Köpfchen</h3>
        </div>
      </div>

      <div class="card"
      onclick="showPlants('Dolden / Trugdolden / Doldenrispen',
      ['Echtes Johanniskraut','Zypressen-Wolfsmilch','Rainfarn'])">

        <img src="images/dolden.jpg">

        <div class="card-content">
          <h3>Dolden / Trugdolden / Doldenrispen</h3>
        </div>
      </div>

    </div>

    <button onclick="showStart()">⬅ Zurück</button>

  `;
}

function showPlants(category,plantList){

  updatePath(category);

  let html = `
    <h2>Passende Pflanzenarten</h2>
    <div class="option-grid">
  `;

  plantList.forEach(plant => {

    html += `
      <div class="card"
      onclick="showPlantCard('${plant}')">

        <img src="${plants[plant].bild}">

        <div class="card-content">
          <h3>${plant}</h3>
          <p>Klicke für die Pflanzenkarte.</p>
        </div>

      </div>
    `;
  });

  html += `
    </div>

    <button onclick="showStart()">
      🔄 Neue Bestimmung
    </button>
  `;

  document.getElementById('content').innerHTML = html;
}

function showPlantCard(plant){

  updatePath('Pflanze bestimmt: ' + plant);

  const p = plants[plant];

  document.getElementById('content').innerHTML = `

    <div class="plant-card">

      <img src="${p.bild}">

      <div class="plant-info">

        <h2>${plant}</h2>

        <div class="info-box">
          <strong>Familie:</strong><br>
          ${p.familie}
        </div>

        <div class="info-box">
          <strong>Typischer Fundort:</strong><br>
          ${p.fundort}
        </div>

        <div class="info-box">
          <strong>Blütezeit:</strong><br>
          ${p.bluetezeit}
        </div>

        <button onclick="showStart()">
          🔄 Neue Pflanze bestimmen
        </button>

      </div>

    </div>
  `;
}

showStart();

</script>

</body>
</html>
